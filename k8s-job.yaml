apiVersion: batch/v1
kind: Job
metadata:
  name: ai-framework-job
spec:
  template:
    spec:
      containers:
      - name: ai-framework
        image: your-registry/ai-framework:latest
        env:
        - name: SONAR_TOKEN
          valueFrom:
            secretKeyRef:
              name: sonar-secret
              key: token
      restartPolicy: Never
  backoffLimit: 1
